<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcwise Agentic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #02040a; --card: #0d1117; --border: #21262d; --text: #f0f6fc; --sub: #8b949e; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .brand { font-size: 20px; font-weight: 800; background: linear-gradient(45deg, #58a6ff, #56d364); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .net-bar { background: #161b22; text-align: center; padding: 6px; font-size: 12px; color: var(--sub); border-bottom: 1px solid var(--border); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .tag { position: absolute; top: 12px; right: 12px; font-size: 11px; background: rgba(88,166,255,0.1); color: #58a6ff; padding: 3px 8px; border-radius: 15px; }
        .bal { font-size: 38px; font-weight: 700; margin: 15px 0; }
        input { width: 100%; padding: 10px; background: #010409; border: 1px solid var(--border); border-radius: 6px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background: #30363d; color: #fff; }
        .btn-success { background: #238636; border-color: #2ea44f; color: #fff; }
        .btn-grid { display: flex; gap: 8px; margin-top: 10px; }
        .ticker { background: rgba(35,134,54,0.1); border: 1px dashed #2ea44f; padding: 8px; border-radius: 6px; text-align: center; color: #56d364; font-family: monospace; }
        .console { background: #010409; border: 1px solid var(--border); font-family: monospace; padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 12px; color: #8b949e; white-space: pre-line; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="brand">🚀 Arcwise Agentic</div>
        <div style="display: flex; gap: 5px;">
            <button id="btn-circle" style="padding: 8px; font-size: 12px; width: auto;">Circle WaaS</button>
            <button id="btn-wallet" onclick="connect()" style="padding: 8px; font-size: 12px; width: auto;">Connect Wallet</button>
        </div>
    </header>

    <div class="net-bar"><span id="net">Network: Disconnected</span> | <span id="addr">Address: None</span></div>

    <main class="container">
        <section class="card">
            <div class="tag">Omnichain</div>
            <h2>Unified Balance Kit</h2>
            <div class="bal"><span id="usdc-balance">71.88</span> USDC</div>
            <div class="btn-grid"><button onclick="switchChain()">Switch Arc Testnet</button></div>
        </section>

        <section class="card">
            <div class="tag">DeFi Stream</div>
            <h2>USDC Micro-payments</h2>
            <input type="text" id="recipient" placeholder="Address (0x...) or Username">
            <input type="number" id="amount" step="any" placeholder="Amount in USDC">
            <button id="btn-pay" onclick="pay()" class="btn-success">Execute Real Payment</button>
            <div id="ticker-box" class="ticker" style="display:none; margin-top:10px;">Status: <span id="tick-msg">Pending</span></div>
        </section>

        <section class="card">
            <div class="tag">AI Intelligence</div>
            <h2>AI Agentic Engine (Free Mode)</h2>
            <button id="btn-voice">🎙️ Speak Command</button>
            <p id="v-out" style="font-size:12px; color:var(--sub); font-style:italic; margin:5px 0;">Say clearly: "Send 0.5 to deba" or "Send 1 to pinky"</p>
            <div class="btn-grid"><button onclick="sim(1)">Run Simulation</button><button onclick="sim(2)">Sleuth Audit</button></div>
            <div id="console" class="console">System: Ready...</div>
        </section>
    </main>

    <script>
        let provider, signer, userAddress;
        const registry = {
            "deba": "0x742d35Cc6634C0532925a3b844Bc454e4438f44e",
            "pinky": "0x90F8bf6A479f320ead074411a4B0e7944Ea8c9C1",
            "smreti": "0x25062c366479f8c6e267b1406e4a29a007b819f6"
        };

        async function connect() {
            if (!window.ethereum) return alert("MetaMask not found!");
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accs[0];
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            document.getElementById('addr').innerText = `Address: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
            document.getElementById('btn-wallet').innerText = "Connected";
            document.getElementById('net').innerText = "Network: Connected";
        }

        async function pay() {
            let to = document.getElementById('recipient').value.trim();
            let amt = document.getElementById('amount').value;
            if (!userAddress) return alert("Connect wallet!");
            if (!to || !amt) return alert("Fill data!");
            
            if (!to.startsWith("0x")) {
                let name = to.toLowerCase();
                if (registry[name]) to = registry[name];
                else {
                    let res = prompt(`"${to}" registry te nai! Target 0x address din:`);
                    if (res && res.startsWith("0x")) { registry[name] = res; to = res; }
                    else return alert("Invalid address");
                }
            }
            const box = document.getElementById('ticker-box'), msg = document.getElementById('tick-msg');
            box.style.display = "block"; msg.innerText = "Broadcasting to MetaMask...";
            try {
                const tx = await signer.sendTransaction({ to: to, value: ethers.parseEther(amt) });
                msg.innerText = "Pending blockchain tx...";
                await tx.wait();
                msg.innerText = "Success! Funds Sent.";
                alert("Payment Successful!");
            } catch(e) { box.style.borderColor="#ff6b6b"; msg.style.color="#ff6b6b"; msg.innerText = "Failed or Denied"; }
        }

        async function switchChain() {
            try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x1F5' }] }); } catch(e){}
        }

        function sim(type) {
            document.getElementById('console').innerText = type === 1 ? "[Simulation] SUCCESS. Gas predicted." : "[Audit] SAFE. Verified Contract.";
        }

        document.getElementById('btn-circle').onclick = function() {
            this.innerText = "Circle Active"; document.getElementById('usdc-balance').innerText = "250.00";
        };

        // ফ্রি স্মার্ট ভয়েস ইঞ্জিন (কোনো API Key লাগবে না)
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            
            document.getElementById('btn-voice').onclick = () => { rec.start(); document.getElementById('v-out').innerText = "🎙️ Listening..."; };
            
            rec.onresult = (e) => {
                const txt = e.results[0][0].transcript.toLowerCase();
                document.getElementById('v-out').innerText = `Captured: "${txt}"`;
                const con = document.getElementById('console'); con.innerText = "[Voice Intent Engine] Parsing words...";
                
                // মুখে যা বলেছেন তা থেকে নাম্বার এবং নাম খুঁজে বের করার অটোমেটিক স্মার্ট লজিক
                let matchAmount = txt.match(/\d+(\.\d+)?/);
                let amount = matchAmount ? matchAmount[0] : null;
                let recipient = null;
                
                Object.keys(registry).forEach(name => { if(txt.includes(name)) recipient = name; });
                
                if (amount && recipient) {
                    con.innerText = `[1. Voice]: Parsed ${amount} USDC to ${recipient}\n[2. Audit]: SAFE\n[3. Sim]: SUCCESS\nResult: APPROVED`;
                    document.getElementById('recipient').value = recipient;
                    document.getElementById('amount').value = amount;
                    
                    // সরাসরি মেটামাস্ক পপআপ ফায়ার করবে
                    setTimeout(() => { document.getElementById('btn-pay').click(); }, 1500);
                } else {
                    con.innerText = "Error: Intent not understood. Try saying: 'Send 0.5 to deba'";
                }
            };
        }
    </script>
</body>
</html>
